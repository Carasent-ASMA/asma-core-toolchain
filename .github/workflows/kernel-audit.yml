name: Kernel audit report

# ADVISORY, scheduled. Reports promotion candidates: libs that have crossed the fleet-usage bar
# since the last look but aren't in the kernel yet. No PR catches this at its own moment (a lib
# crosses the bar when SOME OTHER repo merges a dep). The old cross-repo `mirror` drift check is
# gone — drift is now impossible by construction (asma-mfw-kernel GENERATES its dep names from
# KERNEL_SPEC via sync-deps.mjs, CI-checked). Keeps ONE evergreen tracking issue current. Never
# fails the run (this is a dashboard, not a gate).
on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  ISSUE_TITLE: '🔧 Kernel audit'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The audit tool imports the spec straight from src (plain .mjs — no build/install needed).
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # GH_TOKEN (PAT) reads the asma-app-* fleet package.json files across repos.
      - name: Run audit
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          {
            echo "_Generated by the Kernel audit workflow on $(date -u '+%Y-%m-%d %H:%M UTC'). Re-run: Actions → Kernel audit report → Run workflow._"
            echo
            echo '```'
            node bin/asma-kernel-audit.mjs candidates --org Carasent-ASMA || true
            echo '```'
          } > report.md

      # Upsert a single evergreen issue: edit its body in place if it exists, else create it.
      # Uses the built-in job token (not the cross-org PAT): the tracking issue lives in THIS
      # repo, and `issues: write` above is all `gh issue` needs. Keeping this off secrets.GH_TOKEN
      # means the dashboard issue stays current even when the PAT secret is unset.
      - name: Upsert tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          num=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --json number,title \
                  --jq ".[] | select(.title==\"$ISSUE_TITLE\") | .number" | head -1)
          if [ -n "$num" ]; then
            gh issue edit "$num" --repo "$GITHUB_REPOSITORY" --body-file report.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$ISSUE_TITLE" --body-file report.md
          fi
